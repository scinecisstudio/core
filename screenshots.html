<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Core Launcher - All Screenshots</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">
        <img src="assets/core-logo.png" alt="Core logo" />
        <span>Core Launcher</span>
      </a>
      <a class="btn btn-secondary" href="index.html#gallery">Back</a>
    </div>
  </header>

  <main>
    <section class="container section">
      <div class="section-head">
        <p class="eyebrow">GALLERY</p>
        <h2>All Core app screenshots.</h2>
      </div>

      <div class="gallery-groups">
        <div class="gallery-device">
          <h3 class="gallery-device-title">Phone</h3>
          <div class="gallery-grid full-gallery-grid">
            <figure class="gallery-card screenshot-card"><img src="assets/screenshots/phone/Screenshot_20260301_000748.png" alt="Phone screenshot 1" loading="lazy" decoding="async" /><figcaption>Phone screenshot 1</figcaption></figure>
            <figure class="gallery-card screenshot-card"><img src="assets/screenshots/phone/Screenshot_20260301_000803.png" alt="Phone screenshot 2" loading="lazy" decoding="async" /><figcaption>Phone screenshot 2</figcaption></figure>

          </div>
        </div>

        <div class="gallery-device gallery-device-tablet">

          <div class="gallery-grid full-gallery-grid full-gallery-grid-tablet">

          <div class="gallery-grid full-gallery-grid full-gallery-grid-tablet">
