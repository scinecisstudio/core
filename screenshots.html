<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Core Launcher - All Screenshots</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">
        <img src="assets/core-logo.png" alt="Core logo" />
        <span>Core Launcher</span>
      </a>
      <nav class="nav-links" id="site-nav">
        <a href="index.html">Home</a>
        <a href="privacy-policy.html">Privacy Policy</a>
        <a href="contact.html">Contact</a>
      </nav>
      <a class="btn btn-secondary" href="index.html#gallery">Back</a>
    </div>
  </header>

  <main>
    <section class="container section">
      <div class="section-head">
        <p class="eyebrow">GALLERY</p>
        <h2>All Core app screenshots.</h2>
      </div>

      <div class="gallery-groups">
        <div class="gallery-device">
          <h3 class="gallery-device-title">Phone</h3>
          <div class="gallery-grid full-gallery-grid">
            <figure class="gallery-card screenshot-card"><img src="assets/screenshots/phone/01_quick_tiles_playstore.png" alt="Phone quick tiles screenshot" loading="lazy" decoding="async" /><figcaption>Quick Tiles</figcaption></figure>
            <figure class="gallery-card screenshot-card"><img src="assets/screenshots/phone/02_app_drawer_playstore.png" alt="Phone app drawer screenshot" loading="lazy" decoding="async" /><figcaption>App Drawer</figcaption></figure>
            <figure class="gallery-card screenshot-card"><img src="assets/screenshots/phone/03_app_options_playstore.png" alt="Phone app options screenshot" loading="lazy" decoding="async" /><figcaption>App Options</figcaption></figure>
            <figure class="gallery-card screenshot-card"><img src="assets/screenshots/phone/04_app_category_playstore.png" alt="Phone categories screenshot" loading="lazy" decoding="async" /><figcaption>Categories</figcaption></figure>
            <figure class="gallery-card screenshot-card"><img src="assets/screenshots/phone/05_app_widgets_playstore.png" alt="Phone widgets screenshot" loading="lazy" decoding="async" /><figcaption>Widgets</figcaption></figure>
            <figure class="gallery-card screenshot-card"><img src="assets/screenshots/phone/06_setting_theme_playstore.png" alt="Phone theme settings screenshot" loading="lazy" decoding="async" /><figcaption>Theme Settings</figcaption></figure>
            <figure class="gallery-card screenshot-card"><img src="assets/screenshots/phone/07_setting_backup_playstore.png" alt="Phone backup settings screenshot" loading="lazy" decoding="async" /><figcaption>Backup Settings</figcaption></figure>
            <figure class="gallery-card screenshot-card"><img src="assets/screenshots/phone/08_setting_feature_playstore.png" alt="Phone feature settings screenshot" loading="lazy" decoding="async" /><figcaption>Feature Settings</figcaption></figure>
          </div>
        </div>

        <div class="gallery-device gallery-device-tablet">
          <h3 class="gallery-device-title">7-inch Tablet</h3>
          <div class="gallery-grid full-gallery-grid full-gallery-grid-tablet">
            <figure class="gallery-card screenshot-card tablet-card"><img src="assets/screenshots/7_inch/01_quick_tiles_tablet_playstore.png" alt="7-inch tablet quick tiles screenshot" loading="lazy" decoding="async" /><figcaption>Quick Tiles</figcaption></figure>
            <figure class="gallery-card screenshot-card tablet-card"><img src="assets/screenshots/7_inch/02_app_drawer_tablet_playstore.png" alt="7-inch tablet app drawer screenshot" loading="lazy" decoding="async" /><figcaption>App Drawer</figcaption></figure>
            <figure class="gallery-card screenshot-card tablet-card"><img src="assets/screenshots/7_inch/03_app_options_tablet_playstore.png" alt="7-inch tablet app options screenshot" loading="lazy" decoding="async" /><figcaption>App Options</figcaption></figure>
            <figure class="gallery-card screenshot-card tablet-card"><img src="assets/screenshots/7_inch/04_app_category_tablet_playstore.png" alt="7-inch tablet categories screenshot" loading="lazy" decoding="async" /><figcaption>Categories</figcaption></figure>
            <figure class="gallery-card screenshot-card tablet-card"><img src="assets/screenshots/7_inch/05_app_widgets_tablet_playstore.png" alt="7-inch tablet widgets screenshot" loading="lazy" decoding="async" /><figcaption>Widgets</figcaption></figure>
            <figure class="gallery-card screenshot-card tablet-card"><img src="assets/screenshots/7_inch/06_setting_theme_tablet_playstore.png" alt="7-inch tablet theme settings screenshot" loading="lazy" decoding="async" /><figcaption>Theme Settings</figcaption></figure>
            <figure class="gallery-card screenshot-card tablet-card"><img src="assets/screenshots/7_inch/07_setting_backup_tablet_playstore.png" alt="7-inch tablet backup settings screenshot" loading="lazy" decoding="async" /><figcaption>Backup Settings</figcaption></figure>
            <figure class="gallery-card screenshot-card tablet-card"><img src="assets/screenshots/7_inch/08_setting_feature_tablet_playstore.png" alt="7-inch tablet feature settings screenshot" loading="lazy" decoding="async" /><figcaption>Feature Settings</figcaption></figure>
          </div>
        </div>

        <div class="gallery-device gallery-device-tablet">
          <h3 class="gallery-device-title">10-inch Tablet</h3>
          <div class="gallery-grid full-gallery-grid full-gallery-grid-tablet">
            <figure class="gallery-card screenshot-card tablet-card"><img src="assets/screenshots/10_inch/01_quick_tiles_10inch_playstore.png" alt="10-inch tablet quick tiles screenshot" loading="lazy" decoding="async" /><figcaption>Quick Tiles</figcaption></figure>
            <figure class="gallery-card screenshot-card tablet-card"><img src="assets/screenshots/10_inch/02_app_drawer_10inch_playstore.png" alt="10-inch tablet app drawer screenshot" loading="lazy" decoding="async" /><figcaption>App Drawer</figcaption></figure>
            <figure class="gallery-card screenshot-card tablet-card"><img src="assets/screenshots/10_inch/03_app_options_10inch_playstore.png" alt="10-inch tablet app options screenshot" loading="lazy" decoding="async" /><figcaption>App Options</figcaption></figure>
            <figure class="gallery-card screenshot-card tablet-card"><img src="assets/screenshots/10_inch/04_app_category_10inch_playstore.png" alt="10-inch tablet categories screenshot" loading="lazy" decoding="async" /><figcaption>Categories</figcaption></figure>
            <figure class="gallery-card screenshot-card tablet-card"><img src="assets/screenshots/10_inch/05_app_widgets_10inch_playstore.png" alt="10-inch tablet widgets screenshot" loading="lazy" decoding="async" /><figcaption>Widgets</figcaption></figure>
            <figure class="gallery-card screenshot-card tablet-card"><img src="assets/screenshots/10_inch/06_setting_theme_10inch_playstore.png" alt="10-inch tablet theme settings screenshot" loading="lazy" decoding="async" /><figcaption>Theme Settings</figcaption></figure>
            <figure class="gallery-card screenshot-card tablet-card"><img src="assets/screenshots/10_inch/07_setting_backup_10inch_playstore.png" alt="10-inch tablet backup settings screenshot" loading="lazy" decoding="async" /><figcaption>Backup Settings</figcaption></figure>
            <figure class="gallery-card screenshot-card tablet-card"><img src="assets/screenshots/10_inch/08_setting_feature_10inch_playstore.png" alt="10-inch tablet feature settings screenshot" loading="lazy" decoding="async" /><figcaption>Feature Settings</figcaption></figure>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
